<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahasa Indonesia - Quanta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-materi="data-indo.json">
    <div class="container">
        <nav style="margin-bottom: 20px;">
            <a href="index.html" style="text-decoration: none; color: #000; font-weight: bold;">← Kembali</a>
        </nav>

        <div class="quiz-box">
            <header style="text-align: center; margin-bottom: 20px;">
                <h2 id="question">Memuat soal...</h2>
                <p style="font-size: 0.8rem; opacity: 0.6;">Soal ke: <span id="current-index">1</span></p>
            </header>
            
            <div id="options" class="options-container">
                </div>

            <div id="feedback" class="feedback-area" style="margin-top: 20px; min-height: 50px;">
                </div>

            <button id="next-btn" class="btn-main" onclick="nextQuestion()" style="display:none; width: 100%; margin-top: 20px;">
                Soal Berikutnya →
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
